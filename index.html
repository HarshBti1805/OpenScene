<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenScene</title>
    <script>
      // Apply persisted appearance before the bundle loads to avoid a flash.
      (function () {
        var root = document.documentElement;
        function pref(key, fallback) {
          try {
            var v = localStorage.getItem("openscene." + key);
            return v === null ? fallback : JSON.parse(v);
          } catch (e) {
            return fallback;
          }
        }
        var theme = pref("themePref", "system");
        if (theme === "system") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        root.setAttribute("data-theme", theme);
        var accent = pref("accent", "signal");
        if (accent !== "signal") root.setAttribute("data-accent", accent);
        if (pref("uiDensity", "comfortable") === "compact") root.setAttribute("data-density", "compact");
        if (pref("motionPref", "full") === "reduced") root.setAttribute("data-motion", "reduced");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
