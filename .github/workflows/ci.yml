name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: npm ci

      # Golden pagination/PDF/round-trip tests run on all three platforms.
      - name: Rust test suite (fountain, FDX, pagination, PDF, CRDT, spell, safety)
        run: cargo test --workspace

      - name: TypeScript tests + keystroke latency budget (p95 < 16ms)
        run: npm test

      - name: Type-check and bundle frontend
        run: npm run build

      - name: Compile Tauri app (debug, no bundling)
        run: cargo check -p openscene

  release:
    name: Build installers (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional Developer ID signing + notarization: define these repo
          # secrets and macOS builds are signed/notarized with no other change.
          # Without them the bundle is ad-hoc signed (tauri.macos.conf.json).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # "-" = ad-hoc signing: gives the bundle a valid (unnotarized)
          # signature so Gatekeeper's failure mode is the bypassable
          # "unidentified developer" rather than a broken-bundle state.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenScene ${{ github.ref_name }}"
          releaseBody: |
            Installers are not notarized with Apple or signed with a Microsoft certificate (OpenScene has no paid anything, including developer accounts).

            **macOS**: Gatekeeper will claim the app "is damaged and can't be opened." It isn't damaged — it is unnotarized. After copying OpenScene.app to Applications, run:
            ```
            xattr -cr /Applications/OpenScene.app
            ```
            **Windows**: SmartScreen will warn — choose "More info" → "Run anyway".
          releaseDraft: true
          prerelease: false
